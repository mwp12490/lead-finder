<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business CRM</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- First-Time Setup Wizard Overlay -->
    <div id="setupWizard" class="setup-wizard-overlay" style="display:none">
        <div class="setup-wizard">
            <div class="setup-wizard-header">
                <h2>Welcome to Your Business CRM</h2>
                <p>Let's get you set up in 3 quick steps</p>
            </div>
            <div class="setup-wizard-progress">
                <div class="wizard-step active" data-step="1"><span class="wizard-step-num">1</span><span class="wizard-step-label">Profile</span></div>
                <div class="wizard-step-line"></div>
                <div class="wizard-step" data-step="2"><span class="wizard-step-num">2</span><span class="wizard-step-label">API Key</span></div>
                <div class="wizard-step-line"></div>
                <div class="wizard-step" data-step="3"><span class="wizard-step-num">3</span><span class="wizard-step-label">First Search</span></div>
            </div>
            <div class="setup-wizard-body" id="wizardBody"></div>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <span class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="7" width="20" height="14" rx="2"/>
                    <path d="M16 7V5a4 4 0 0 0-8 0v2"/>
                </svg>
            </span>
            <span class="logo-text">CRM</span>
        </div>
        <div class="sidebar-search">
            <input type="text" id="globalSearch" class="global-search-input" placeholder="Search everything...">
            <div id="globalSearchResults" class="global-search-results" style="display:none"></div>
        </div>

        <!-- Business Flow Progress Bar -->
        <div class="sidebar-progress" id="sidebarProgress">
            <div class="progress-label">Business Pipeline</div>
            <div class="progress-bar-mini">
                <div class="progress-bar-fill" id="pipelineProgressFill" style="width:0%"></div>
            </div>
            <div class="progress-stats" id="pipelineProgressStats"></div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">OVERVIEW</div>
            <a href="#dashboard" class="nav-item active" data-section="dashboard">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                <span>Dashboard</span>
            </a>

            <div class="nav-section-label">WORKFLOW</div>
            <a href="#leads" class="nav-item" data-section="leads">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <span class="nav-label-with-stage"><span class="stage-number">1</span> Find Leads</span>
                <span class="nav-help-tip" data-tooltip="Search for local businesses and save them as leads">?</span>
            </a>
            <a href="#contacts" class="nav-item" data-section="contacts">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span class="nav-label-with-stage"><span class="stage-number">2</span> Reach Out</span>
                <span class="nav-help-tip" data-tooltip="Convert leads to contacts and start outreach">?</span>
            </a>
            <a href="#deals" class="nav-item" data-section="deals">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="6" x2="12" y2="18"/>
                    <path d="M15.5 9.5c0-1.38-1.57-2.5-3.5-2.5S8.5 8.12 8.5 9.5 10.07 12 12 12s3.5 1.12 3.5 2.5S13.93 17 12 17s-3.5-1.12-3.5-2.5"/>
                </svg>
                <span class="nav-label-with-stage"><span class="stage-number">3</span> Close Deals</span>
                <span class="nav-help-tip" data-tooltip="Track proposals, negotiations, and close sales">?</span>
            </a>
            <a href="#projects" class="nav-item" data-section="projects">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                <span class="nav-label-with-stage"><span class="stage-number">4</span> Deliver Work</span>
                <span class="nav-help-tip" data-tooltip="Manage projects, milestones, and deliverables">?</span>
            </a>
            <a href="#tasks" class="nav-item" data-section="tasks">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M9 12l2 2 4-4"/>
                </svg>
                <span class="nav-label-with-stage"><span class="stage-number">5</span> Follow Up</span>
                <span class="nav-badge" id="taskBadge" style="display:none">0</span>
                <span class="nav-help-tip" data-tooltip="Manage tasks, reminders, and follow-ups">?</span>
            </a>

            <div class="nav-section-label">TOOLS</div>
            <a href="#ai" class="nav-item" data-section="ai">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1.27A7 7 0 0 1 13 22h-2a7 7 0 0 1-6.73-3H3a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
                    <circle cx="9.5" cy="15.5" r="1"/>
                    <circle cx="14.5" cy="15.5" r="1"/>
                </svg>
                <span>AI Assistant</span>
                <span class="nav-badge-new">NEW</span>
            </a>
            <a href="#calendar" class="nav-item" data-section="calendar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <span>Calendar</span>
            </a>
            <a href="#reports" class="nav-item" data-section="reports">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"/>
                    <line x1="12" y1="20" x2="12" y2="4"/>
                    <line x1="6" y1="20" x2="6" y2="14"/>
                </svg>
                <span>Reports</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="nav-item" id="theme-toggle-btn" title="Toggle Theme" style="background:none;border:none;width:100%;text-align:left;font-family:inherit;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <span>Theme</span>
            </button>
            <a href="#settings" class="nav-item" data-section="settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span>Settings</span>
            </a>
        </div>
    </aside>

    <main class="main-content" id="mainContent">
        <section id="section-dashboard" class="section"></section>
        <section id="section-leads" class="section" style="display:none"></section>
        <section id="section-contacts" class="section" style="display:none"></section>
        <section id="section-deals" class="section" style="display:none"></section>
        <section id="section-projects" class="section" style="display:none"></section>
        <section id="section-tasks" class="section" style="display:none"></section>
        <section id="section-ai" class="section" style="display:none"></section>
        <section id="section-calendar" class="section" style="display:none"></section>
        <section id="section-reports" class="section" style="display:none"></section>
        <section id="section-settings" class="section" style="display:none"></section>
    </main>

    <div id="modalContainer"></div>

    <div id="toastContainer" class="toast-container"></div>

    <!-- Help tooltip popover (global) -->
    <div id="helpTooltip" class="help-tooltip-popover" style="display:none"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
